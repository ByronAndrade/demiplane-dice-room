<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dice Animation Playground</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0c0f;
        --panel: rgba(10, 12, 15, 0.84);
        --panel-soft: #1b2028;
        --line: #303743;
        --text: #eef1f5;
        --muted: #a9b1bd;
        --blood: #b20d1b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: #101216;
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      .toolbar {
        position: relative;
        z-index: 3;
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto;
        gap: 18px;
        align-items: center;
        padding: 14px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.09);
        background: var(--panel);
        backdrop-filter: blur(16px);
      }

      .title {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        align-items: baseline;
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
        align-items: center;
      }

      .counter {
        display: grid;
        grid-template-columns: auto 42px auto;
        gap: 6px;
        align-items: center;
        min-height: 36px;
        padding: 5px 7px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .counter span {
        min-width: 56px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .counter input {
        width: 42px;
        height: 26px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: #080a0d;
        color: var(--text);
        text-align: center;
      }

      .counter button,
      .action {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: var(--panel-soft);
        color: var(--text);
        cursor: pointer;
      }

      .counter button {
        display: grid;
        place-items: center;
        width: 26px;
        height: 26px;
        padding: 0;
        font-size: 18px;
        line-height: 1;
      }

      .action {
        min-height: 38px;
        padding: 0 13px;
        font-weight: 850;
      }

      .action.primary {
        border-color: rgba(215, 25, 43, 0.62);
        background: linear-gradient(180deg, #c01829, #811018);
      }

      .action.active {
        border-color: rgba(215, 25, 43, 0.7);
        box-shadow: 0 0 0 2px rgba(215, 25, 43, 0.22) inset;
      }

      .counter button:hover,
      .action:hover {
        border-color: rgba(255, 255, 255, 0.28);
        filter: brightness(1.08);
      }

      .table {
        position: relative;
        min-height: 0;
        overflow: hidden;
      }

      .stage {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background:
          linear-gradient(rgba(255, 255, 255, 0.024) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px),
          radial-gradient(circle at 50% 45%, rgba(178, 13, 27, 0.14), transparent 48%),
          #101216;
        background-size: 34px 34px, 34px 34px, auto, auto;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .rail {
        position: absolute;
        inset: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        box-shadow:
          inset 0 0 0 8px rgba(0, 0, 0, 0.13),
          inset 0 0 80px rgba(0, 0, 0, 0.36);
        pointer-events: none;
      }

      .readout {
        position: absolute;
        left: 18px;
        bottom: 18px;
        z-index: 2;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-width: min(840px, calc(100vw - 36px));
        pointer-events: none;
      }

      .chip {
        min-height: 28px;
        padding: 5px 9px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: rgba(8, 10, 13, 0.76);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .chip strong {
        color: var(--text);
      }

      @media (max-width: 760px) {
        body {
          overflow: auto;
        }

        .app {
          min-height: 100dvh;
        }

        .toolbar {
          grid-template-columns: 1fr;
        }

        .controls {
          justify-content: flex-start;
        }

        .table {
          min-height: 680px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <div class="title">
          <h1>Dice Animation Playground</h1>
          <span class="status" id="status">Carregando modelo 3D...</span>
        </div>
        <div class="controls" aria-label="Controles da rolagem">
          <label class="counter">
            <span>Normal</span>
            <button type="button" data-step="regular" data-delta="-1" aria-label="Diminuir dados normais">-</button>
            <input id="regularCount" type="number" min="0" max="20" value="7" />
            <button type="button" data-step="regular" data-delta="1" aria-label="Aumentar dados normais">+</button>
          </label>
          <label class="counter">
            <span>Hunger</span>
            <button type="button" data-step="hunger" data-delta="-1" aria-label="Diminuir dados hunger">-</button>
            <input id="hungerCount" type="number" min="0" max="20" value="2" />
            <button type="button" data-step="hunger" data-delta="1" aria-label="Aumentar dados hunger">+</button>
          </label>
          <button class="action primary" id="rollButton" type="button">Rolar</button>
          <button class="action" id="criticalButton" type="button">Critico</button>
          <button class="action" id="failureButton" type="button">Falha bestial</button>
          <button class="action" id="autoButton" type="button">Auto</button>
          <button class="action" id="clearButton" type="button">Limpar</button>
        </div>
      </header>
      <section class="table" aria-label="Mesa de testes">
        <div class="stage" id="stage"></div>
        <div class="rail"></div>
        <div class="readout" id="readout"></div>
      </section>
    </main>
    <script type="module" src="/extension/dev/dice-playground-3d.js?v=quantized-roll-energy-20260514"></script>
  </body>
</html>
